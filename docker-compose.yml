name: bts-sec-staircase-lab

services:
  # PostgreSQL backs database lessons such as auth, access control, and data exposure.
  # Credentials are deterministic local demo values only.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bts_sec_lab}
      POSTGRES_USER: ${POSTGRES_USER:-bts_lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-FAKE_LOCAL_POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Redis is reserved for local rate-limit, session, and throttling examples.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # MinIO provides S3-compatible local object storage for file-upload lessons.
  # These are fake local demo credentials, not cloud credentials.
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-FAKE_LOCAL_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-FAKE_LOCAL_MINIO_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Nginx is the local reverse-proxy foundation for server configuration lessons.
  # It currently serves local health and placeholder routes without app upstreams.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  postgres-data:
  minio-data:
