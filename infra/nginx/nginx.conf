events {}

http {
  default_type application/json;

  server {
    listen 8080;
    server_name localhost;

    # Baseline headers used by the clean infra foundation.
    # Later server-misconfiguration stages can intentionally weaken these locally.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /health {
      return 200 '{"ok":true,"service":"bts-sec-local-nginx","mode":"local-only"}';
    }

    location = / {
      return 200 '{"name":"bts-sec-staircase-lab","purpose":"local educational security lab","status":"infra-ready"}';
    }

    location / {
      return 404 '{"error":"route_not_configured","message":"App upstreams are intentionally not wired in the infra-only scaffold."}';
    }
  }
}

