id: stage-01-secrets
order: 1
title: Exposed secrets
status: implemented
focus: Secret exposure across frontend, config, docs, CI, and build artifacts.
scanMode: code
target:
  baseUrl: http://localhost:8080
  routes:
    - /stage-01-code-scan-only
services: []
expectedFindingsFile: ../../expected/stage-01.expected.yaml
codeScanRoots:
  - .
intendedVulnerabilities:
  - id: SECRET-001
    title: Service-role-like key in frontend-accessible code
    severity: critical
    files:
      - .env.local
      - src/lib/supabase.ts
  - id: SECRET-002
    title: Secret-like value in README
    severity: high
    files:
      - README.md
  - id: SECRET-003
    title: Secret-like value in CI workflow
    severity: high
    files:
      - .github/workflows/deploy.yml
  - id: SECRET-004
    title: Secret-like value in built static JS
    severity: critical
    files:
      - dist/static/main.js
  - id: SECRET-005
    title: Database URL in config
    severity: high
    files:
      - .env.local
      - docker-compose.yml
fakeSecretValues:
  - fake_service_role_key_for_training_only
  - fake_stripe_secret_for_training_only
  - fake_openai_key_for_training_only
  - fake_jwt_secret_for_training_only
  - postgres://fake_user:fake_password@localhost:5432/fake_db
safety:
  - All values are fake training strings.
  - This stage must not connect to real services.
  - This stage is code-scannable and does not need a running vulnerable app.

