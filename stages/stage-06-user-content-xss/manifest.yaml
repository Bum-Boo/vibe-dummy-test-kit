id: stage-06-user-content-xss
order: 6
title: Unsafe user content and XSS risk
status: implemented
focus: Unsafe rendering of user-controlled or AI-generated HTML.
scanMode: code
target:
  baseUrl: http://localhost:8080
  routes:
    - /portfolio/alice
    - /admin/inquiries/inquiry-001
services: []
expectedFindingsFile: ../../expected/stage-06.expected.yaml
codeScanRoots:
  - .
intendedVulnerabilities:
  - id: XSS-001
    title: User-controlled bio rendered via dangerouslySetInnerHTML
    severity: high
    files:
      - src/vulnerable-user-bio.tsx
  - id: XSS-002
    title: Markdown raw HTML rendered without sanitization
    severity: high
    files:
      - src/vulnerable-markdown.tsx
  - id: XSS-003
    title: Admin inquiry content rendered as HTML
    severity: high
    files:
      - src/vulnerable-admin-inquiry.tsx
  - id: XSS-004
    title: Missing or weak CSP
    severity: medium
    files:
      - src/security-headers.ts
negativeExamples:
  - id: XSS-005
    title: Safe escaped component should not be flagged
    files:
      - src/safe-user-content.tsx
    reason: User content is rendered through JSX text interpolation.
safety:
  - Demonstration content uses harmless formatting strings only.
  - No real-world payloads are included.
  - This stage is code-scannable and does not need a running vulnerable app.

