server {
  listen 8080;
  server_name localhost;

  # Stage 08 intentionally vulnerable: security headers are missing here.
  # Missing examples include Content-Security-Policy, X-Frame-Options,
  # X-Content-Type-Options, and Referrer-Policy.

  location / {
    proxy_pass http://target-api:3000;
  }

  location /api/ {
    proxy_pass http://target-api:3000;
  }
}

