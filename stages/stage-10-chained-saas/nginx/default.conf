server {
  listen 8080;
  server_name localhost;

  # Stage 10 intentionally vulnerable: overly permissive CORS/server config for the chained SaaS.
  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Demo-User-Id" always;

  location / {
    proxy_pass http://target-api:4000;
  }
}

