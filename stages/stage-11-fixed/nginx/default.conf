server {
  listen 8080;
  server_name localhost;

  add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none'" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Access-Control-Allow-Origin "http://localhost:3000" always;
  add_header Access-Control-Allow-Headers "Content-Type, X-Demo-User-Id" always;

  location / {
    proxy_pass http://target-api:4000;
  }
}

